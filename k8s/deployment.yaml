apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-color-demo
  namespace: vault-demo
  labels:
    app: vault-color-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vault-color-demo
  template:
    metadata:
      labels:
        app: vault-color-demo
    spec:
      containers:
        - name: vault-color-demo
          # This tag is updated by GitHub Actions on each push
          image: ghcr.io/timkrebs/vault-color-demo:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # ---------------------------------------------------------------
            # BG_COLOR comes from the K8s Secret synced by VSO from Vault
            # ---------------------------------------------------------------
            - name: BG_COLOR
              valueFrom:
                secretKeyRef:
                  name: vault-color-secret
                  key: bg_color
            - name: SECRET_SOURCE
              value: "vault-kv → VSO → k8s-secret"
            - name: VAULT_SECRET_PATH
              value: "secret/data/demo/color"
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app']
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
