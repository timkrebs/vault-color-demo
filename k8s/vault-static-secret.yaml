# =============================================================================
# VaultStaticSecret: Syncs a Vault KV v2 secret to a Kubernetes Secret
#
# This is the core of the demo: change the value in Vault,
# VSO updates the K8s Secret, pod picks up the new color.
#
# Vault-side setup:
#   vault kv put secret/demo/color \
#     bg_color="#2ecc71" \
#     secret_source="vault-kv-via-vso"
# =============================================================================
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-color-secret
  namespace: vault-demo
spec:
  vaultAuthRef: vault-auth

  type: kv-v2
  mount: secret
  path: demo/color

  # How often VSO checks Vault for changes
  refreshAfter: 10s

  # The resulting Kubernetes Secret
  destination:
    name: vault-color-secret
    create: true
    overwrite: true
    type: Opaque

    # Optional: transform keys if Vault key names differ
    # transformation:
    #   excludeRaw: true
    #   templates:
    #     bg_color:
    #       text: '{{ .Secrets.bg_color }}'

  # Rollout restart the deployment when the secret changes
  # This is what makes the color change visible immediately
  rolloutRestartTargets:
    - kind: Deployment
      name: vault-color-demo
