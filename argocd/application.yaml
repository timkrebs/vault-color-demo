# =============================================================================
# ArgoCD Application: Watches the GitHub repo's k8s/ directory
# and syncs manifests to the EKS cluster automatically
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-color-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Point to your GitHub repo
    repoURL: https://github.com/timkrebs/vault-color-demo.git
    targetRevision: main
    path: k8s

    # Optional: if using Kustomize
    # kustomize:
    #   images:
    #     - ghcr.io/timkrebs/vault-color-demo

  destination:
    server: https://kubernetes.default.svc
    namespace: vault-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in fields that change at runtime
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

---
# =============================================================================
# ArgoCD Setup (one-time):
#
#   # Install ArgoCD on EKS
#   kubectl create namespace argocd
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#
#   # Expose ArgoCD UI (for demo)
#   kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "LoadBalancer"}}'
#
#   # Get initial admin password
#   kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
#
#   # If repo is private, add credentials
#   argocd repo add https://github.com/timkrebs/vault-color-demo.git \
#     --username <github-user> \
#     --password <github-pat>
#
#   # Apply this Application manifest
#   kubectl apply -f argocd/application.yaml
# =============================================================================
